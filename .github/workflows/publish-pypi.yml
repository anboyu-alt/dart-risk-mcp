name: Publish to PyPI

# PyPI 배포 — GitHub Release 게시 시 자동, 또는 수동(workflow_dispatch) 실행.
# Trusted Publishing(OIDC) 사용 — API 토큰/Secret 불필요.
# 사전 1회 설정: pypi.org → dart-risk-mcp → Settings → Publishing →
#   Add trusted publisher (GitHub): owner=anboyu-alt, repo=dart-risk-mcp,
#   workflow=publish-pypi.yml, environment=(빈칸).
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # Trusted Publishing(OIDC) 토큰 발급에 필요

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Show built artifacts
        run: ls -1 dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
