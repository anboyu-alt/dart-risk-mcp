name: Publish network viz

# 행위자 연결망 HTML을 매일 빌드해 Cloudflare Pages(비공개 시크릿 URL)에 배포.
# refresh-known-actors(04:00 KST)가 sightings를 갱신한 뒤 돌도록 04:40 KST에 예약.
#
# 접근 통제 4중 모델 (클로즈베타):
#   (1) Cloudflare Access 이메일 OTP 로그인 — 기본 거부(deny-by-default),
#       허용 명단은 Zero Trust 대시보드의 Rule group으로 관리.
#       Access 애플리케이션 2개 필요: 프로덕션(<프로젝트>.pages.dev)용 +
#       프리뷰(*.<프로젝트>.pages.dev)용. Pages의 "Enable access policy"
#       토글만으로는 프리뷰만 보호되므로 프로덕션용은 별도 구성.
#   (2) 허용 이메일 명단 — 대시보드에서만 관리, 레포에 두지 않음.
#   (3) 랜덤 *.pages.dev 프로젝트명 + 경로 시크릿 토큰 — Access 설정이
#       풀리는 사고에 대비한 심층방어로 유지. 루트는 빈 미끼 페이지.
#   (4) noindex 메타.
# 배포는 Access와 무관: wrangler는 api.cloudflare.com API로 업로드하므로
# 보호된 호스트네임을 거치지 않음. 이 워크플로우는 수정 불필요.
#
# 필요한 Secrets (없으면 배포 스텝은 조용히 스킵):
#   CLOUDFLARE_API_TOKEN   — Pages 편집 권한 토큰
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare 계정 ID
#   CF_PAGES_PROJECT       — Pages 프로젝트명 (서브도메인이 됨, 비공개 유지)
#   NETWORK_URL_TOKEN      — URL 경로 시크릿 토큰 (예: 무작위 20자)
#   SIGHTINGS_REPO_TOKEN   — private sightings 저장소 읽기용 (기존 재사용)

on:
  schedule:
    - cron: "40 19 * * *"   # UTC 19:40 = 한국 04:40 (refresh 이후)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Checkout sightings (private)
        uses: actions/checkout@v5
        with:
          repository: anboyu-alt/dart-risk-mcp-sightings
          token: ${{ secrets.SIGHTINGS_REPO_TOKEN }}
          path: _sightings
      - name: Build network HTML
        env:
          SIGHTINGS_PATH: _sightings/sightings.json
          NETWORK_URL_TOKEN: ${{ secrets.NETWORK_URL_TOKEN }}
        run: |
          TOKEN="${NETWORK_URL_TOKEN:-preview}"
          mkdir -p "dist/$TOKEN"
          python scripts/build_network_html.py --out "dist/$TOKEN/index.html"
          # 루트는 빈 페이지(디렉터리 리스팅 방지) — 토큰 경로로만 접근
          printf '<!doctype html><title>.</title>' > dist/index.html
          echo "빌드 경로: /$TOKEN/"
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CF_PAGES_PROJECT" ]; then
            echo "::notice::Cloudflare Secrets 미설정 — 배포 스킵 (빌드만 검증)"
            exit 0
          fi
          # 프로젝트가 없으면 자동 생성(대시보드 수동 생성 불필요). 이미 있으면 무시.
          npx --yes wrangler@3 pages project create "$CF_PAGES_PROJECT" \
            --production-branch=production 2>/dev/null || true
          npx --yes wrangler@3 pages deploy dist \
            --project-name="$CF_PAGES_PROJECT" --branch=production --commit-dirty=true
