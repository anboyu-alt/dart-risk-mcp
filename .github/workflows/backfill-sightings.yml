name: Backfill sightings

# 12개월 sightings 베이스 백필. 예산(max_funding=3500 ≈ 9천 콜)으로 보통
# 2회 실행에 완료. 진행 상황은 sightings.json의 backfill.done_until에
# 저장돼 재실행 시 자동으로 이어감. 완료 후 재발화는 no-op(API 콜 0).
#
# ⚠️ schedule 블록은 2026-07 첫 주말 자동 실행용 임시 설정 —
#    백필 완료 확인 후 이 블록을 제거할 것 (남아 있어도 no-op이지만 청소 권장).

on:
  schedule:
    - cron: "0 13 3 7 *"   # 7/3 22:00 KST (토요일 밤)
    - cron: "0 1 4,5 7 *"  # 7/4·7/5 10:00 KST (일·월 오전, 미완 시 이어달리기)
  workflow_dispatch:
    inputs:
      start_date:
        description: "수집 시작일 YYYY-MM-DD (기본: 종료일-365일)"
        required: false
        default: ""
      end_date:
        description: "수집 종료일 YYYY-MM-DD (기본: 오늘)"
        required: false
        default: ""
      max_funding:
        description: "자금조달 공시 처리 상한 (기본 3500 ≈ 9천 콜, 일일 쿼터의 절반)"
        required: false
        default: "3500"

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Checkout sightings (private)
        uses: actions/checkout@v5
        with:
          repository: anboyu-alt/dart-risk-mcp-sightings
          token: ${{ secrets.SIGHTINGS_REPO_TOKEN }}
          path: _sightings
      - name: Backfill sightings
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SIGHTINGS_PATH: _sightings/sightings.json
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 스케줄 실행: 종료일을 고정해 백필이 자기 종결되도록 함
            # (움직이는 '오늘'을 쫓지 않음 — 최신분은 일일 크론 담당)
            python scripts/backfill_sightings.py --end 2026-07-03 --max-funding 3500
          else
            ARGS=""
            [ -n "${{ inputs.start_date }}" ] && ARGS="$ARGS --start ${{ inputs.start_date }}"
            [ -n "${{ inputs.end_date }}" ]   && ARGS="$ARGS --end ${{ inputs.end_date }}"
            python scripts/backfill_sightings.py $ARGS --max-funding ${{ inputs.max_funding }}
          fi
      - name: Commit sightings (private)
        if: always()
        working-directory: _sightings
        run: |
          if [ -n "$(git status --porcelain sightings.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sightings.json
            git commit -m "chore: sightings 백필"
            git push
          else
            echo "sightings 변경 없음"
          fi
