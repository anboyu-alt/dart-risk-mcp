name: Backfill sightings

# 과거 자금조달 공시 sightings 백필. 진행은 sightings.json의 backfill.done_until에
# 저장돼 재실행 시 이어감(청크 중복은 dedup으로 무해). 완료 후 재발화는 no-op.
#
# 백필 완주(2015-01-01~2026-07-06 전 구간, done_until=BF_END 도달)로 스케줄
# 블록은 제거했다. 필요 시 workflow_dispatch로 임의 구간을 수동 실행할 수 있고,
# 더 과거로 재확장할 때는 BF_START/BF_END 조정 후 reset=true 디스패치 1회로
# 전진 마커를 초기화한 뒤 스케줄 블록을 되살리면 된다.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "수집 시작일 YYYY-MM-DD (기본: 종료일-365일)"
        required: false
        default: ""
      end_date:
        description: "수집 종료일 YYYY-MM-DD (기본: 오늘)"
        required: false
        default: ""
      max_funding:
        description: "자금조달 공시 처리 상한 (기본 3000)"
        required: false
        default: "3000"
      reset:
        description: "진행 마커 초기화(더 과거로 재수집 시작할 때만 true)"
        required: false
        default: "false"

# 2015 확장 목표 구간 — 스케줄 실행이 참조(자기 종결). 2021-07-06 이후는
# 이미 완주된 구간이라 재스캔하지 않는다(쿼터 절약).
env:
  BF_START: "2015-01-01"
  BF_END: "2021-07-05"
  BF_MAXFUNDING: "3000"

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Checkout sightings (private)
        uses: actions/checkout@v5
        with:
          repository: anboyu-alt/dart-risk-mcp-sightings
          token: ${{ secrets.SIGHTINGS_REPO_TOKEN }}
          path: _sightings
      - name: Backfill sightings
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SIGHTINGS_PATH: _sightings/sightings.json
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 스케줄: 고정 구간을 done_until 기준으로 이어달리기(자기 종결)
            python scripts/backfill_sightings.py \
              --start "$BF_START" --end "$BF_END" --max-funding "$BF_MAXFUNDING"
          else
            ARGS=""
            [ -n "${{ inputs.start_date }}" ] && ARGS="$ARGS --start ${{ inputs.start_date }}"
            [ -n "${{ inputs.end_date }}" ]   && ARGS="$ARGS --end ${{ inputs.end_date }}"
            [ "${{ inputs.reset }}" = "true" ] && ARGS="$ARGS --reset"
            python scripts/backfill_sightings.py $ARGS --max-funding ${{ inputs.max_funding }}
          fi
      - name: Commit sightings (private)
        if: always()
        run: |
          cd _sightings
          if [ -z "$(git status --porcelain sightings.json)" ]; then
            echo "sightings 변경 없음"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 긴 백필이 도는 동안 다른 워크플로(일일 discover 등)가 먼저 push하면
          # non-fast-forward로 거부된다. 그때 원격을 받아 우리 수집분을 재병합
          # (dedup)한 뒤 재시도 — 최대 5회.
          for attempt in 1 2 3 4 5; do
            git add sightings.json
            git commit -m "chore: sightings 과거 백필" || true
            if git push; then echo "push 성공 (시도 $attempt)"; exit 0; fi
            echo "::warning::push 거부 — 원격 재병합 후 재시도 ($attempt)"
            cp sightings.json /tmp/ours.json
            git fetch origin main
            git reset --hard origin/main
            ( cd "$GITHUB_WORKSPACE" \
              && python -m scripts.merge_sightings_files /tmp/ours.json _sightings/sightings.json )
            sleep 3
          done
          echo "::error::5회 재시도 후에도 push 실패"; exit 1
